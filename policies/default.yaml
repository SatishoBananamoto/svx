# svx default safety policies

blocks:
  # Hard blocks — these commands are never allowed
  force_push_to_main: true
  delete_root: true
  protect_claude_settings: true

confirmations:
  # These require explicit user confirmation
  irreversible_actions: true
  data_loss: true
  force_flags: true
  high_blast_radius: true
  config_file_edits: true

thresholds:
  # Blast radius above this requires confirmation
  max_blast_radius_without_confirm: 5
